# Súmulas STJ — Superior Tribunal de Justiça
#
# STJ súmulas cited by topical files or project-level institutions.md
# files in this workspace. Added on demand, not bulk-collected — STJ
# has ~700 súmulas and only a subset is relevant to the topics covered
# by this repository.
#
# Resolved via cite.py with bracket form `SSTJ359`, `SSTJ385`, etc.
# Documented in CLAUDE.md.
#
# Sources:
# - Verbatim enunciado from the STJ portal or official publications.
# - Each entry cites its provenance in the `fonte` field.
#
# Status values:
#   vigente   — currently in force
#   cancelada — explicitly cancelled by STJ
#   revogada  — formally revoked
#   superada  — effectively overruled by later STJ or STF jurisprudence
#
# Fields:
#   numero     — STJ súmula number (matches the bracket-form id, e.g., 359 → `SSTJ359`)
#   enunciado  — verbatim text as published by STJ
#   status     — vigente | cancelada | revogada | superada
#   aprovada   — date the súmula was approved (YYYY-MM-DD)
#   fonte      — canonical URL or publication reference
#   nota       — optional; context or cross-references
#
# When adding entries:
# - Only add súmulas actually cited in a topical or project file.
# - Preserve verbatim text. Do not paraphrase or reformat.
# - Include the approval date and a fonte URL when available.

schema_version: 1
last_updated: 2026-04-22

sumulas:

  SSTJ106:
    numero: 106
    enunciado: >-
      Proposta a ação no prazo fixado para o seu exercício, a demora
      na citação, por motivos inerentes ao mecanismo da justiça, não
      justifica o acolhimento da arguição de prescrição ou decadência.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27106%27
    nota: >-
      Aplicável amplamente em execução fiscal: se o ajuizamento
      ocorre antes do termo prescricional mas a citação demora por
      razões do Judiciário, não há prescrição. Referida em
      topics/execucao-fiscal.md.

  SSTJ392:
    numero: 392
    enunciado: >-
      A Fazenda Pública pode substituir a certidão de dívida ativa
      (CDA) até a prolação da sentença de embargos, quando se tratar
      de correção de erro material ou formal, vedada a modificação do
      sujeito passivo da execução.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27392%27
    nota: >-
      Limita o escopo de correção da CDA — erro material/formal sim,
      mudança do réu não. Referida em topics/execucao-fiscal.md.

  SSTJ393:
    numero: 393
    enunciado: >-
      A exceção de pré-executividade é admissível na execução fiscal
      relativamente às matérias conhecíveis de ofício que não demandem
      dilação probatória.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27393%27
    nota: >-
      Fundamento central da defesa sem garantia do juízo. Matérias
      típicas: prescrição, decadência, ilegitimidade, nulidade da CDA.
      Referida em topics/execucao-fiscal.md.

  SSTJ414:
    numero: 414
    enunciado: >-
      A citação por edital na execução fiscal é cabível quando
      frustradas as demais modalidades.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27414%27
    nota: >-
      Requer esgotamento prévio de Correios e oficial de justiça.
      Referida em topics/execucao-fiscal.md.

  SSTJ430:
    numero: 430
    enunciado: >-
      O inadimplemento da obrigação tributária pela sociedade não gera,
      por si só, a responsabilidade solidária do sócio-gerente.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27430%27
    nota: >-
      Contrapeso à S. 435. Redirecionamento exige conduta do
      CTN.135 (excesso de poderes, infração à lei, dissolução
      irregular), não basta a inadimplência. Referida em
      topics/direito-tributario.md e topics/execucao-fiscal.md.

  SSTJ435:
    numero: 435
    enunciado: >-
      Presume-se dissolvida irregularmente a empresa que deixar de
      funcionar no seu domicílio fiscal, sem comunicação aos órgãos
      competentes, legitimando o redirecionamento da execução fiscal
      para o sócio-gerente.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27435%27
    nota: >-
      Principal mecanismo prático de redirecionamento ao
      sócio-gerente em EF. Combina com CTN.135.III. Referida em
      topics/direito-tributario.md e topics/execucao-fiscal.md.

  SSTJ436:
    numero: 436
    enunciado: >-
      A entrega de declaração pelo contribuinte reconhecendo débito
      fiscal constitui o crédito tributário, dispensada qualquer outra
      providência por parte do fisco.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27436%27
    nota: >-
      Dispensa lançamento de ofício quando há declaração pelo
      contribuinte — o débito declarado e não pago vai direto para
      cobrança/dívida ativa. Referida em topics/execucao-fiscal.md.

  SSTJ555:
    numero: 555
    enunciado: >-
      Quando não houver declaração do débito, o prazo decadencial
      quinquenal para o Fisco constituir o crédito tributário
      conta-se exclusivamente na forma do art. 173, I, do CTN, nos
      casos em que a legislação atribui ao sujeito passivo o dever
      de antecipar o pagamento sem prévio exame da autoridade
      administrativa.
    status: vigente
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27555%27
    nota: >-
      Regra decisiva para distinguir decadência do CTN.150.§4 (com
      pagamento antecipado) vs CTN.173.I (sem pagamento ou sem
      declaração). Referida em topics/direito-tributario.md e
      topics/execucao-fiscal.md.

  SSTJ359:
    numero: 359
    enunciado: >-
      Cabe ao órgão mantenedor do Cadastro de Proteção ao Crédito a
      notificação do devedor antes de proceder à inscrição.
    status: vigente
    aprovada: "2008-08-13"
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27359%27
    nota: >-
      Complemented by Súmula 404/STJ (AR dispensável). Applies to all
      credit-protection registries (Serasa, SPC, Boa Vista). The
      notification duty falls on the bureau, not on the creditor.
      Cited in: serasa/docs/institutions.md §2.2.

  SSTJ385:
    numero: 385
    enunciado: >-
      Da anotação irregular em cadastro de proteção ao crédito, não cabe
      indenização por dano moral, quando preexistente legítima inscrição,
      ressalvado o direito ao cancelamento.
    status: vigente
    aprovada: "2009-05-27"
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27385%27
    nota: >-
      Flexibilized by REsp 1.704.002/SP (2020): moral damages may be
      awarded despite preexisting listing if the prior listing is itself
      judicially contested and the consumer demonstrates verossimilhança.
      Cited in: serasa/docs/institutions.md §2.3.

  SSTJ404:
    numero: 404
    enunciado: >-
      É dispensável o Aviso de Recebimento (AR) na carta de comunicação
      ao consumidor sobre a negativação de seu nome em bancos de dados e
      cadastros.
    status: vigente
    aprovada: "2009-10-28"
    fonte: https://scon.stj.jus.br/SCON/sumulas/doc.jsp?livre=@num=%27404%27
    nota: >-
      Complements Súmula 359: the bureau must notify (S. 359) but proof
      of receipt is not required (S. 404). Key precedent: REsp 783.907/RS.
      Cited in: serasa/docs/institutions.md §2.2.
